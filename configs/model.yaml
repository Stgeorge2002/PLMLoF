# Model architecture configuration
model:
  # ESM2 backbone
  esm2_model_name: "facebook/esm2_t33_650M_UR50D"  # Production
  esm2_model_name_tiny: "facebook/esm2_t6_8M_UR50D"  # Testing / CPU

  # LoRA configuration
  lora:
    enabled: true
    rank: 16
    alpha: 32
    dropout: 0.1
    target_modules: ["query", "value"]

  # Comparison module
  comparison:
    use_cross_attention: false  # Enable for Phase 5
    pool_strategy: "mean_max"  # mean_max | cls | attention

  # Classifier head
  classifier:
    hidden_dims: [256, 64]
    dropout: 0.3
    num_classes: 3  # LoF=0, WT=1, GoF=2
    label_smoothing: 0.05

  # Nucleotide features
  nucleotide_features:
    num_features: 12
