# RunPod production training config — optimized for GPU pods (A100/H100/A6000)
training:
  # Stage 1: Classification head only (ESM2 frozen)
  stage1:
    max_epochs: 30
    learning_rate: 5.0e-4
    weight_decay: 0.01
    batch_size: 32          # Larger batch on GPU
    gradient_accumulation_steps: 2
    warmup_ratio: 0.1
    scheduler: "cosine"

  # Stage 2: LoRA fine-tuning
  stage2:
    max_epochs: 5
    learning_rate: 5.0e-5
    weight_decay: 0.01
    batch_size: 16
    gradient_accumulation_steps: 4
    warmup_ratio: 0.05
    scheduler: "cosine"

  # General
  early_stopping_patience: 7
  metric_for_best_model: "macro_f1"
  mixed_precision: "fp16"      # Use bf16 for A100/H100: "bf16"
  max_seq_length: 1024
  seed: 42

  # Multi-task regression (DMS z-score prediction)
  regression_weight: 0.1       # Weight of SmoothL1 regression loss vs CE classification loss
  regression_warmup_epochs: 3  # Linearly ramp regression weight over first N epochs

  # Class weights (auto-computed if null)
  class_weights: null

  # Logging
  log_every_n_steps: 25
  eval_every_n_steps: 200
  save_every_n_steps: 500

  # Paths (RunPod persistent storage)
  output_dir: "outputs/production/"
  checkpoint_dir: "outputs/production/checkpoints/"
